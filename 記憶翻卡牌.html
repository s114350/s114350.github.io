<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記憶翻牌</title>
<link rel='icon'  href='https://github.com/s114350/s114350.github.io/blob/main/556b9ddf-6681-49e9-bf8b-f30a82b7e025.png'>
<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:"Microsoft JhengHei",sans-serif;
    text-align:center;

    background-image:url("background.png");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    min-height:100vh;
}

.overlay{
    min-height:100vh;
    background:rgba(255,255,255,0.25);
    padding:20px;
}

h1{
    color:#2563eb;
    font-size:56px;
    margin:10px;
    text-shadow:2px 2px 5px white;
}

button{
    border:none;
    border-radius:15px;
    padding:12px 20px;
    margin:5px;
    font-size:18px;
    cursor:pointer;
    background:#4f6cff;
    color:white;
}

button:hover{
    opacity:0.9;
}

.info{
    font-size:28px;
    margin-top:15px;
    color:#14532d;
    font-weight:bold;
}

#game{
    display:grid;
    gap:12px;
    justify-content:center;
    margin-top:25px;
}

.card{
    width:85px;
    height:85px;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#bde7ff;
    border-radius:16px;

    font-size:42px;
    cursor:pointer;
    user-select:none;

    transition:0.3s;
}

.card.flipped{
    background:white;
}

.card.matched{
    background:#86efac;
}

.popup{
    display:none;

    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.5);

    justify-content:center;
    align-items:center;
}

.popup-box{
    background:white;
    padding:30px;
    border-radius:20px;
    min-width:300px;
}

.win-title{
    font-size:34px;
    color:#f59e0b;
}

.lose-title{
    font-size:34px;
    color:#6b7280;
}

.lose{
    animation:shake .5s;
}

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-10px);}
    50%{transform:translateX(10px);}
    75%{transform:translateX(-10px);}
    100%{transform:translateX(0);}
}
</style>
</head>

<body>

<div class="overlay">

<h1>記憶翻牌</h1>

<button onclick="startGame(4)">4 × 4</button>
<button onclick="startGame(6)">6 × 6</button>

<div class="info">
⏰ 時間：
<span id="timer">60</span>
秒
</div>

<button id="startBtn" onclick="startTimer()">
開始遊戲
</button>

<div id="game"></div>

</div>

<!-- 成功 -->
<div id="winPopup" class="popup">
<div class="popup-box">

<div class="win-title">
⭐ 恭喜完成！ ⭐
</div>

<p>你成功完成挑戰！</p>

<button onclick="restartGame()">
再來一局
</button>

</div>
</div>

<!-- 失敗 -->
<div id="losePopup" class="popup">
<div class="popup-box lose">

<div class="lose-title">
☁️ 挑戰失敗 ☁️
</div>

<p>時間到！再試一次吧！</p>

<button onclick="restartGame()">
重新挑戰
</button>

</div>
</div>

<script>

const emojis = [
'🍰','🧁','🍩','🍪',
'🍫','🍬','🍭','🍿',
'🍔','🍟','🍕','🌭',
'🍎','🍓','🍇','🍉',
'🍋','🥐'
];

let firstCard = null;
let secondCard = null;
let lockBoard = false;

let boardSize = 4;

let timeLeft = 60;
let timerInterval;

let gameStarted = false;

function shuffle(array){

    for(let i=array.length-1;i>0;i--){

        let j=Math.floor(Math.random()*(i+1));

        [array[i],array[j]]=[array[j],array[i]];
    }
}

function startGame(size){

    boardSize = size;

    clearInterval(timerInterval);

    gameStarted = false;

    if(size === 4){
        timeLeft = 60;
    }else{
        timeLeft = 100;
    }

    document.getElementById("timer").textContent = timeLeft;

    firstCard = null;
    secondCard = null;
    lockBoard = false;

    document.getElementById("winPopup").style.display = "none";
    document.getElementById("losePopup").style.display = "none";

    const game = document.getElementById("game");

    game.innerHTML = "";

    game.style.gridTemplateColumns =
        `repeat(${size},85px)`;

    let pairCount = (size * size) / 2;

    let cards = [
        ...emojis.slice(0,pairCount),
        ...emojis.slice(0,pairCount)
    ];

    shuffle(cards);

    cards.forEach(symbol => {

        const card =
            document.createElement("div");

        card.className = "card";

        card.dataset.value = symbol;

        card.textContent = "?";

        card.addEventListener("click",
            ()=>flipCard(card));

        game.appendChild(card);

    });
}

function startTimer(){

    if(gameStarted) return;

    gameStarted = true;

    timerInterval = setInterval(()=>{

        timeLeft--;

        document.getElementById("timer")
            .textContent = timeLeft;

        if(timeLeft <= 0){

            clearInterval(timerInterval);

            showLose();
        }

    },1000);
}

function flipCard(card){

    if(!gameStarted) return;

    if(lockBoard) return;

    if(card.classList.contains("flipped")) return;

    if(card.classList.contains("matched")) return;

    card.classList.add("flipped");

    card.textContent = card.dataset.value;

    if(!firstCard){

        firstCard = card;
        return;
    }

    secondCard = card;

    lockBoard = true;

    if(firstCard.dataset.value === secondCard.dataset.value){

        firstCard.classList.add("matched");
        secondCard.classList.add("matched");

        resetTurn();

        checkWin();

    }else{

        setTimeout(()=>{

            firstCard.classList.remove("flipped");
            secondCard.classList.remove("flipped");

            firstCard.textContent = "?";
            secondCard.textContent = "?";

            resetTurn();

        },800);
    }
}

function resetTurn(){

    firstCard = null;
    secondCard = null;
    lockBoard = false;
}

function checkWin(){

    const matched =
        document.querySelectorAll(".matched").length;

    const total =
        document.querySelectorAll(".card").length;

    if(matched === total){

        clearInterval(timerInterval);

        document.getElementById("winPopup")
            .style.display = "flex";
    }
}

function showLose(){

    lockBoard = true;

    document.getElementById("losePopup")
        .style.display = "flex";
}

function restartGame(){

    startGame(boardSize);
}

startGame(4);

</script>

</body>
</html>
