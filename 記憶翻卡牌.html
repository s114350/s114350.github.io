<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記憶翻牌</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  text-align:center;
  background:url('file_00000000efe8720981c9628254f7d93c') center/cover no-repeat fixed;
  min-height:100vh;
}
.overlay{background:rgba(255,255,255,.45);min-height:100vh;padding:20px;}
h1{color:#4f46e5}
button{
  padding:12px 18px;
  margin:8px;
  border:none;
  border-radius:12px;
  background:#6366f1;
  color:white;
  cursor:pointer;
}
#game{
  display:grid;
  gap:12px;
  justify-content:center;
  margin-top:20px;
}
.card{
  width:85px;
  height:85px;
  border-radius:16px;
  background:#bae6fd;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:3.2rem;
  cursor:pointer;
}
.flipped{background:white}
.matched{background:#86efac}
#popup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  justify-content:center;
  align-items:center;
}
.box{
  background:white;
  padding:30px;
  border-radius:20px;
}
</style>
</head>
<body>
<div class='overlay'>
<h1>記憶翻牌</h1>
<button onclick='startGame(4)'>4x4</button>
<button onclick='startGame(6)'>6x6</button>
<div id='game'></div>
</div>
<div id='popup'>
  <div class='box'>
    <h2>🎉 恭喜完成！</h2>
    <button onclick='restartGame()'>重新開始</button>
  </div>
</div>
<script>
const emojis=['🧸','🌸','🍓','🐥','☁️','🌈','🫧','🧁','⭐','🍬','🐱','🐰','💙','🍀','🎀','✨','🍡','🩷'];
let first=null,second=null,lock=false,size=4;

function startGame(s){
  size=s;
  document.getElementById('popup').style.display='none';
  const game=document.getElementById('game');
  game.innerHTML='';
  game.style.gridTemplateColumns=`repeat(${s},85px)`;
  let pairs=(s*s)/2;
  let cards=[...emojis.slice(0,pairs),...emojis.slice(0,pairs)].sort(()=>Math.random()-0.5);
  cards.forEach(e=>{
    let card=document.createElement('div');
    card.className='card';
    card.dataset.value=e;
    card.textContent='?';
    card.onclick=()=>flip(card);
    game.appendChild(card);
  });
}

function flip(card){
  if(lock||card.classList.contains('flipped')) return;
  card.classList.add('flipped');
  card.textContent=card.dataset.value;
  if(!first){first=card;return;}
  second=card; lock=true;
  if(first.dataset.value===second.dataset.value){
    first.classList.add('matched');
    second.classList.add('matched');
    reset();checkWin();
  } else {
    setTimeout(()=>{
      first.classList.remove('flipped');
      second.classList.remove('flipped');
      first.textContent='?';
      second.textContent='?';
      reset();
    },800);
  }
}

function reset(){first=null;second=null;lock=false;}
function checkWin(){
  if(document.querySelectorAll('.matched').length===document.querySelectorAll('.card').length)
    document.getElementById('popup').style.display='flex';
}
function restartGame(){startGame(size)}
startGame(4);
</script>
</body>
</html>
