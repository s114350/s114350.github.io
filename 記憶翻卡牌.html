<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>記憶翻牌</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="overlay">

    <h1>記憶翻牌</h1>

    <div class="menu">

        <button onclick="startGame(4)">
            4 × 4
        </button>

        <button onclick="startGame(6)">
            6 × 6
        </button>

    </div>

    <div class="timerBox">

        ⏰ 剩餘時間：

        <span id="timer">
            60
        </span>

        秒

    </div>

    <button
    id="startBtn"
    class="startBtn"
    onclick="startTimer()">

        開始遊戲

    </button>

    <div id="game"></div>

</div>

<!-- 成功視窗 -->

<div
id="winPopup"
class="popup">

    <div class="popupBox">

        <h2 class="winTitle">

            ⭐ 恭喜完成！ ⭐

        </h2>

        <p>

            你成功完成所有配對！

        </p>

        <button
        onclick="restartGame()">

            再來一局

        </button>

    </div>

</div>

<!-- 失敗視窗 -->

<div
id="losePopup"
class="popup">

    <div class="popupBox loseBox">

        <h2 class="loseTitle">

            ☁️ 挑戰失敗 ☁️

        </h2>

        <p>

            時間到啦！

            再試一次吧！

        </p>

        <button
        onclick="restartGame()">

            重新挑戰

        </button>

    </div>

</div>

<!-- 彩帶容器 -->

<div id="confettiContainer">
</div>

<!-- 水果攻擊容器 -->

<div id="fruitContainer">
</div>

<script src="script.js"></script>

</body>

</html>
